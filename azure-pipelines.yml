trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main

variables:
  dotnetVersion: '8.0.x'
  buildConfiguration: 'Release'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

parameters:
  - name: baseUrl
    displayName: 'Base URL to test against'
    type: string
    default: 'https://the-internet.herokuapp.com'
  - name: browser
    displayName: 'Browser'
    type: string
    default: 'Chromium'
    values:
      - Chromium
      - Firefox
      - Webkit

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Test
    displayName: 'Run Playwright Tests'
    jobs:
      - job: PlaywrightTests
        displayName: 'Playwright Test Suite'
        timeoutInMinutes: 30

        steps:
          - task: UseDotNet@2
            displayName: 'Setup .NET SDK'
            inputs:
              packageType: 'sdk'
              version: $(dotnetVersion)

          - script: dotnet restore PlaywrightFramework.sln
            displayName: 'Restore dependencies'

          - script: dotnet build PlaywrightFramework.sln --configuration $(buildConfiguration) --no-restore
            displayName: 'Build solution'

          - script: pwsh PlaywrightFramework/bin/$(buildConfiguration)/net8.0/playwright.ps1 install --with-deps
            displayName: 'Install Playwright browsers'

          - script: |
              dotnet test PlaywrightFramework.sln \
                --configuration $(buildConfiguration) \
                --no-build \
                --logger "trx;LogFileName=test-results.trx" \
                --logger "html;LogFileName=test-results.html" \
                --results-directory $(Build.ArtifactStagingDirectory)/TestResults
            displayName: 'Run Playwright tests'
            env:
              TEST_BASE_URL: ${{ parameters.baseUrl }}
              TEST_HEADLESS: 'true'
              TEST_BROWSER_TYPE: ${{ parameters.browser }}
            continueOnError: true

          - task: PublishTestResults@2
            displayName: 'Publish test results'
            condition: always()
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '$(Build.ArtifactStagingDirectory)/TestResults/**/*.trx'
              mergeTestResults: true
              failTaskOnFailedTests: true
              testRunTitle: 'Playwright Tests - ${{ parameters.browser }}'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish test artifacts'
            condition: always()
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/TestResults'
              ArtifactName: 'TestResults'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish failure traces'
            condition: failed()
            inputs:
              PathtoPublish: 'PlaywrightFramework/TestResults'
              ArtifactName: 'PlaywrightTraces'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish self-healing report'
            condition: always()
            inputs:
              PathtoPublish: 'PlaywrightFramework/TestResults/healing-report.json'
              ArtifactName: 'SelfHealingReport'
            continueOnError: true
